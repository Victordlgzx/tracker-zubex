<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanIAción · Zubex</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --zubex-blue: #185FA5;
  --zubex-blue-dark: #0C447C;
  --zubex-blue-light: #E6F1FB;
  --zubex-orange: #D85A30;
  --zubex-pending: #B5D4F4;
  --zubex-pending-text: #0C447C;
  --bg: #EEF4FB;
  --card-bg: #ffffff;
  --text: #1a2a3a;
  --text-muted: #7a8fa8;
  --border: rgba(24,95,165,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Exo 2', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; max-width: 560px; margin: 0 auto; overflow: hidden; }

/* LOGIN */
#login-screen { position: fixed; inset: 0; background: linear-gradient(145deg, #0C447C 0%, #185FA5 50%, #1e72c7 100%); display: flex; align-items: center; justify-content: center; z-index: 999; }
#login-screen::before { content:''; position:absolute; inset:0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
#login-box { background: white; border-radius: 24px; padding: 36px 28px; width: 320px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.3); position: relative; animation: loginPop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes loginPop { from { transform: scale(0.85) translateY(20px); opacity:0; } to { transform: scale(1) translateY(0); opacity:1; } }
#login-box .logo-wrap { margin-bottom: 6px; }
#login-box .logo-wrap img { height: 36px; }
#login-logo-text { font-family: 'Exo 2', sans-serif; font-size: 32px; font-weight: 700; color: #185FA5; letter-spacing: -1px; margin-bottom: 4px; }
#login-logo-text span { color: #D85A30; font-size: 20px; vertical-align: super; }
#login-tagline { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--zubex-blue); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
#login-tagline span { color: var(--zubex-orange); font-weight: 700; }
#login-box input { width: 100%; padding: 11px 14px; border-radius: 12px; border: 1.5px solid var(--border); font-family: 'Exo 2', sans-serif; font-size: 13px; margin-bottom: 10px; outline: none; transition: border 0.2s; background: var(--bg); }
#login-box input:focus { border-color: var(--zubex-blue); background: white; }
#login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--zubex-blue), var(--zubex-blue-dark)); color: white; border: none; border-radius: 12px; font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 15px rgba(24,95,165,0.4); }
#login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(24,95,165,0.5); }
#login-error { color: var(--zubex-orange); font-size: 11px; margin-top: 8px; display: none; font-weight: 500; }

/* HEADER */
#header { background: linear-gradient(135deg, var(--zubex-blue-dark) 0%, var(--zubex-blue) 100%); padding: 12px 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 20px rgba(12,68,124,0.3); }
#header-left { display: flex; align-items: center; gap: 10px; }
#header img { height: 28px; filter: brightness(0) invert(1); }
#header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.25); }
#header-title { }
#header-title h1 { font-size: 13px; font-weight: 600; color: white; letter-spacing: 0.3px; }
#header-title p { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; font-family: 'Space Mono', monospace; }
#header-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; display: flex; align-items: center; gap: 5px; }
#header-badge .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.3)} }
#header-badge span { font-size: 10px; color: rgba(255,255,255,0.8); font-family: 'Space Mono', monospace; letter-spacing: 0.5px; }
#zubex-logo-text { font-family: 'Exo 2', sans-serif; font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.5px; line-height: 1; }
#zubex-logo-text span { color: #4a9de0; font-size: 14px; vertical-align: super; }

/* CHAT */
#chat { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 12px; }
#welcome-banner { flex-shrink: 0; padding: 10px 12px; background: white; border-bottom: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
#welcome-banner p { font-size: 13px; line-height: 1.5; color: var(--text); }
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row { display: flex; animation: msgIn 0.3s cubic-bezier(0.34,1.2,0.64,1); }
@keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
.msg-row.user { justify-content: flex-end; }
.msg-row.bot { justify-content: flex-start; }
.bubble { max-width: 94%; }
.bubble-text { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; }
.user .bubble-text { background: linear-gradient(135deg, var(--zubex-blue), var(--zubex-blue-dark)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(24,95,165,0.3); }
.bot .bubble-text { background: white; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

/* CARD */
.card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-top: 8px; box-shadow: 0 4px 16px rgba(24,95,165,0.08); overflow: hidden; position: relative; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg, var(--zubex-blue), #4a9de0, var(--zubex-blue)); background-size: 200%; animation: shimmer 3s linear infinite; }
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
.tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; margin-top: 4px; }
.tag { font-size: 10px; border-radius: 6px; padding: 3px 8px; font-weight: 600; letter-spacing: 0.3px; }
.tag-blue { background: var(--zubex-blue-light); color: var(--zubex-blue-dark); }
.tag-gray { background: #f0f0ea; color: #444; }
.tag-green { background: #E1F5EE; color: #085041; }
.tag-orange { background: #FEF3E8; color: #8B4513; }
.desc { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Space Mono', monospace; }

/* STEPBAR */
.stepbar { display: flex; gap: 3px; margin: 4px 0; }
.step { flex: 1; height: 52px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8.5px; font-weight: 600; padding: 0 4px; text-align: center; line-height: 1.3; position: relative; overflow: hidden; cursor: default; transition: transform 0.2s; }
.step:hover { transform: translateY(-2px); }
.step-icon { font-size: 16px; margin-bottom: 2px; display: block; }
.step-fecha { font-size: 7.5px; opacity: 0.85; margin-top: 1px; font-family: 'Space Mono', monospace; }
.step-done { background: linear-gradient(145deg, #1a6dbf, var(--zubex-blue)); color: white; box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); }
.step-active { background: linear-gradient(145deg, #e8612a, var(--zubex-orange)); color: white; box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); animation: stepPulse 2s ease-in-out infinite; }
@keyframes stepPulse { 0%,100%{box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 0 0 rgba(216,90,48,0.3)} 50%{box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 0 4px rgba(216,90,48,0)} }
.step-pending { background: var(--zubex-pending); color: var(--zubex-pending-text); }
.step:first-child { border-radius: 10px 0 0 10px; }
.step:last-child { border-radius: 0 10px 10px 0; }
.step:only-child { border-radius: 10px; }

.legend { display: flex; gap: 10px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 3px; }

/* INPUT */
#input-area { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: white; flex-shrink: 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
#input-area input { flex: 1; padding: 10px 16px; border-radius: 24px; border: 1.5px solid var(--border); font-family: 'Exo 2', sans-serif; font-size: 13px; outline: none; background: var(--bg); transition: border 0.2s, background 0.2s; color: var(--text); }
#input-area input:focus { border-color: var(--zubex-blue); background: white; }
#send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--zubex-blue), var(--zubex-blue-dark)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 12px rgba(24,95,165,0.35); transition: transform 0.15s, box-shadow 0.15s; }
#send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 16px rgba(24,95,165,0.45); }
#send-btn svg { display: block; }
</style>
</head>

// ICONS per process
var STEP_ICONS = {
  'EXT': '🧻',
  'IMP': '🎨',
  'CORR': '🗃️',
  'BOL': '🗃️',
  'EMP': '🗃️'
};

function detectTipo(codigo) {
  if (!codigo) return { impreso: false, tipo: 'funda' };
  var parts = codigo.split('-');
  if (parts.length < 3) return { impreso: false, tipo: 'funda' };
  var bloque = parts[1];
  if (bloque.length < 6) return { impreso: false, tipo: 'funda' };
  var imp = bloque.substring(2, 4);
  var unit = bloque.substring(4, 6);
  var impreso = imp === '10' || imp === '11';
  var tipo = 'funda';
  if (unit === '03') tipo = 'bolsa';
  else if (unit === '01') tipo = 'bobina';
  else if (unit === '02' || unit === '08') tipo = 'funda';
  return { impreso: impreso, tipo: tipo };
}

function getFlow(row) {
  var det = detectTipo(row.CODIGO);
  var impreso = det.impreso;
  var tipo = det.tipo;
  var impEnBolseo = impreso && (row['IMP.LINEA PRIORI'] || '').trim().toUpperCase() === 'BOL';
  var steps = [{ key: 'EXT', label: 'Extrusión', status: row['EXT.ESTATUS'], fecha: row['FECHA EN QUE SE EXTRUYE'] }];
  if (impreso && !impEnBolseo) steps.push({ key: 'IMP', label: 'Impresión', status: row['IMP. ESTATUS'], fecha: row['FECHA EN QUE SE IMPRIME '] });
  if (tipo === 'funda') steps.push({ key: 'CORR', label: 'Corrugado', status: row['CORR.ESTATUS'], fecha: row['FECHA EN QUE SE CORRUGA'] });
  else if (tipo === 'bolsa') steps.push({ key: 'BOL', label: 'Bolseo', status: row['BOL.ESTATUS'], fecha: row['FECHA EN QUE SE BOLSEA'] });
  else if (tipo === 'bobina') steps.push({ key: 'EMP', label: 'Empaque', status: row['EMP.STATUS'], fecha: row['FECHA EN QUE SE EMPACA'] });
  return { steps: steps, impreso: impreso, tipo: tipo, impEnBolseo: impEnBolseo };
}

var DONE_ST = ['TERMINADO', 'TERMINADA'];
var ACTIVE_ST = ['PROCESO', 'PARCIAL', 'INCOMPLETO', 'SOLICITADO', 'DISPONIBLE', 'PENDIENTE'];

function stepState(status) {
  if (!status) return 'pending';
  var s = status.trim().toUpperCase();
  for (var i = 0; i < DONE_ST.length; i++) { if (s === DONE_ST[i]) return 'done'; }
  for (var j = 0; j < ACTIVE_ST.length; j++) { if (s.indexOf(ACTIVE_ST[j]) !== -1) return 'active'; }
  return 'pending';
}

function fechaValida(f) {
  if (!f) return false;
  var yr = parseInt(f.split('/')[2]);
  return yr >= 2024;
}

function tipoFolio(folio) {
  if (!folio) return 'normal';
  var f = folio.trim().toUpperCase();
  if (f === 'E.0000') return 'no_programado';
  if (f === 'STOCK') return 'stock';
  return 'normal';
}

function generarMensaje(rows) {
  if (!rows.length) return 'No encontré ese pedido. Puedes buscar por número, cliente o código.';
  var pedido = rows[0].PEDIDO;
  var cliente = rows[0].CLIENTE;
  var folio = tipoFolio(rows[0].FOLIO);
  var n = rows.length;
  if (folio === 'no_programado') return 'El pedido ' + pedido + ' de ' + cliente + ' aún no ha sido programado en producción. Por favor contacta al departamento de planeación.';
  var fechaInvalida = false, incompleto = false;
  for (var i = 0; i < rows.length; i++) {
    var flow = getFlow(rows[i]);
    var isStock = tipoFolio(rows[i].FOLIO) === 'stock';
    for (var j = 0; j < flow.steps.length; j++) {
      var s = flow.steps[j];
      var st = (s.status || '').trim().toUpperCase();
      if (isStock && s.key === 'EXT') continue;
      if (DONE_ST.indexOf(st) !== -1) continue;
      if (st === 'INCOMPLETO' || st === 'PARCIAL') { incompleto = true; continue; }
      if (s.fecha && !fechaValida(s.fecha)) fechaInvalida = true;
    }
  }
  if (fechaInvalida) return 'No tengo información clara del pedido ' + pedido + '. Por favor dirígete con el personal de planeación.';
  var partes = n === 1 ? '1 partida' : n + ' partidas';
  var extDone=true, impDone=true, corrDone=true, bolDone=true, empDone=true;
  var extNeeded=false, impNeeded=false, corrNeeded=false, bolNeeded=false, empNeeded=false;
  var nextStep=null, nextFecha='';
  for (var i = 0; i < rows.length; i++) {
    var flow = getFlow(rows[i]);
    var isStock = tipoFolio(rows[i].FOLIO) === 'stock';
    for (var j = 0; j < flow.steps.length; j++) {
      var s = flow.steps[j];
      var effectiveSt = (isStock && s.key === 'EXT') ? 'TERMINADO' : s.status;
      var state = stepState(effectiveSt);
      if (s.key==='EXT'){extNeeded=true; if(state!=='done')extDone=false;}
      if (s.key==='IMP'){impNeeded=true; if(state!=='done')impDone=false;}
      if (s.key==='CORR'){corrNeeded=true; if(state!=='done')corrDone=false;}
      if (s.key==='BOL'){bolNeeded=true; if(state!=='done')bolDone=false;}
      if (s.key==='EMP'){empNeeded=true; if(state!=='done')empDone=false;}
      if (state!=='done' && !nextStep) { nextStep=s.label; nextFecha=(s.fecha&&fechaValida(s.fecha))?' el '+s.fecha:''; }
    }
  }
  var msg = 'Pedido ' + pedido + ' de ' + cliente + ', ' + partes + '. ';
  var hechos = [];
  if (extNeeded&&extDone) hechos.push('ya extruido');
  if (impNeeded&&impDone) hechos.push('impreso');
  if (corrNeeded&&corrDone) hechos.push('corrugado');
  if (bolNeeded&&bolDone) hechos.push('bolseado');
  if (empNeeded&&empDone) hechos.push('empacado');
  if (hechos.length) msg += hechos.join(', ') + '. ';
  if (nextStep) msg += 'Pendiente: ' + nextStep + nextFecha + '.';
  else msg += 'Todo terminado, listo para entrega. ✅';
  if (incompleto) msg += ' ⚠️ Al parecer fue concluido con un faltante, valídalo con planeación.';
  return msg;
}

function buscar() {
  var q = txt.value.trim();
  if (!q) return;
  txt.value = '';
  addMsg('user', q, null);
  var qUp = q.toUpperCase();
  var resultados = [];
  for (var i = 0; i < PROD_DATA.length; i++) {
    var r = PROD_DATA[i];
    if ((r.PEDIDO||'').toUpperCase()===qUp || (r.CLIENTE||'').toUpperCase().indexOf(qUp)!==-1 || (r.CODIGO||'').toUpperCase().indexOf(qUp)!==-1) {
      resultados.push(i);
    }
  }
  var pedidosVistos = {}, filtrados = [];
  for (var i = 0; i < resultados.length; i++) {
    var p = PROD_DATA[resultados[i]].PEDIDO;
    if (!pedidosVistos[p]) pedidosVistos[p] = true;
    filtrados.push(resultados[i]);
  }
  var porPedido = {};
  for (var i = 0; i < resultados.length; i++) {
    var r = PROD_DATA[resultados[i]];
    if (!porPedido[r.PEDIDO]) porPedido[r.PEDIDO] = [];
    porPedido[r.PEDIDO].push(r);
  }
  var mensaje = '';
  if (!filtrados.length) mensaje = 'No encontré ese pedido. Puedes buscar por número, cliente o código.';
  else if (Object.keys(porPedido).length === 1) mensaje = generarMensaje(porPedido[Object.keys(porPedido)[0]]);
  else mensaje = 'Encontré ' + Object.keys(porPedido).length + ' pedidos para "' + q + '", mostrando todos:';
  addMsg('bot', mensaje, filtrados);
}

function renderCard(row) {
  var flow = getFlow(row);
  var steps = flow.steps, impreso = flow.impreso, tipo = flow.tipo, impEnBolseo = flow.impEnBolseo;
  var tipoLabel = impreso ? (impEnBolseo ? tipo+' monotinta' : tipo+' impresa') : tipo+' s/imp';
  var folio = tipoFolio(row.FOLIO);
  var isStock = folio === 'stock';
  var tags = '<span class="tag tag-blue">#'+row.PEDIDO+'</span>';
  tags += '<span class="tag tag-gray">'+row.CLIENTE+'</span>';
  tags += '<span class="tag tag-green">'+tipoLabel+'</span>';
  if (row['PT CEDIS']) tags += '<span class="tag tag-orange">📅 PT CEDIS: '+row['PT CEDIS']+'</span>';
  var stepsHtml = '';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var effectiveStatus = (isStock && s.key==='EXT') ? 'TERMINADO' : s.status;
    var state = stepState(effectiveStatus);
    var cls = state==='done' ? 'step-done' : state==='active' ? 'step-active' : 'step-pending';
    var icon = STEP_ICONS[s.key] || '⚙️';
    var fechaHtml = (s.fecha && state!=='done') ? '<span class="step-fecha">'+s.fecha+'</span>' : '';
    stepsHtml += '<div class="step '+cls+'"><span class="step-icon">'+icon+'</span>'+s.label+fechaHtml+'</div>';
  }
  return '<div class="card"><div class="tags">'+tags+'</div>'+
    '<div class="desc">'+( row['DESCRIPCIÓN']||'')+'</div>'+
    '<div class="stepbar">'+stepsHtml+'</div>'+
    '<div class="legend">'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--zubex-blue)"></div>Terminado</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--zubex-orange)"></div>En proceso</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:var(--zubex-pending)"></div>Pendiente</div>'+
    '</div></div>';
}

function addMsg(role, text, indices) {
  var rowEl = document.createElement('div');
  rowEl.className = 'msg-row ' + role;
  var bubble = document.createElement('div');
  bubble.className = 'bubble';
  var bt = document.createElement('div');
  bt.className = 'bubble-text';
  bt.textContent = text;
  bubble.appendChild(bt);
  if (indices && indices.length) {
    for (var i = 0; i < indices.length; i++) {
      var r = PROD_DATA[indices[i]];
      if (r) { var tmp = document.createElement('div'); tmp.innerHTML = renderCard(r); bubble.appendChild(tmp.firstChild); }
    }
  }
  rowEl.appendChild(bubble);
  chat.appendChild(rowEl);
  chat.scrollTop = chat.scrollHeight;
}

// Welcome shown in sticky banner above
</script>
</body>
</html>
