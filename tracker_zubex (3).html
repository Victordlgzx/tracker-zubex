<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente de Producción Zubex</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f9f9f9; display: flex; flex-direction: column; height: 100vh; max-width: 540px; margin: 0 auto; }
#header { background: #185FA5; padding: 12px 16px; flex-shrink: 0; }
#header h1 { font-size: 14px; font-weight: 500; color: #E6F1FB; }
#header p { font-size: 11px; color: #85B7EB; margin-top: 2px; }
#chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.msg-row { display: flex; }
.msg-row.user { justify-content: flex-end; }
.msg-row.bot { justify-content: flex-start; }
.bubble { max-width: 92%; }
.bubble-text { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
.user .bubble-text { background: #185FA5; color: #E6F1FB; border-bottom-right-radius: 4px; }
.bot .bubble-text { background: white; color: #333; border: 0.5px solid #e0e0e0; border-bottom-left-radius: 4px; }
.card { background: white; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 10px 12px; margin-top: 6px; }
.tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
.tag { font-size: 11px; border-radius: 5px; padding: 2px 7px; }
.tag-blue { background: #E6F1FB; color: #0C447C; }
.tag-gray { background: #F1EFE8; color: #444; }
.tag-green { background: #E1F5EE; color: #085041; }
.tag-orange { background: #FAEEDA; color: #633806; }
.desc { font-size: 10px; color: #888; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stepbar { display: flex; gap: 2px; margin: 6px 0 4px; }
.step { flex: 1; height: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; padding: 0 3px; text-align: center; line-height: 1.2; }
.step .step-fecha { font-size: 8px; opacity: 0.85; margin-top: 1px; }
.step-done { background: #185FA5; color: #E6F1FB; }
.step-active { background: #D85A30; color: #FAECE7; }
.step-pending { background: #B5D4F4; color: #0C447C; }
.legend { display: flex; gap: 10px; margin-top: 4px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 3px; font-size: 9px; color: #888; }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; }
#input-area { padding: 10px 12px; border-top: 0.5px solid #e0e0e0; display: flex; gap: 8px; background: white; flex-shrink: 0; }
#input-area input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 0.5px solid #ccc; font-size: 13px; outline: none; }
#send-btn { width: 36px; height: 36px; border-radius: 50%; background: #185FA5; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn svg { display: block; }
.loading { background: white; border: 0.5px solid #e0e0e0; border-radius: 14px; padding: 8px 14px; font-size: 13px; color: #888; }
</style>
</head>

    </svg>
  </button>
</div>

document.getElementById('counter').textContent = PROD_DATA.length + ' pedidos · detección automática por código';

const txt = document.getElementById('txt');
const btn = document.getElementById('send-btn');
const chat = document.getElementById('chat');

txt.addEventListener('keydown', function(e) { if (e.key === 'Enter') send(); });
btn.addEventListener('click', function() { send(); });

function detectTipo(codigo) {
  if (!codigo) return { impreso: false, tipo: 'funda' };
  const parts = codigo.split('-');
  if (parts.length < 3) return { impreso: false, tipo: 'funda' };
  const bloque = parts[1];
  if (bloque.length < 6) return { impreso: false, tipo: 'funda' };
  const imp = bloque.substring(2, 4);
  const unit = bloque.substring(4, 6);
  const impreso = imp === '10' || imp === '11';
  let tipo = 'funda';
  if (unit === '03') tipo = 'bolsa';
  else if (unit === '01') tipo = 'bobina';
  else if (unit === '02' || unit === '08') tipo = 'funda';
  return { impreso, tipo };
}

function getFlow(row) {
  const det = detectTipo(row.CODIGO);
  const impreso = det.impreso;
  const tipo = det.tipo;
  // Si IMP.LINEA PRIORI = BOL, la impresion va en bolseo, no en departamento separado
  const impEnBolseo = impreso && (row['IMP.LINEA PRIORI'] || '').trim().toUpperCase() === 'BOL';

  const steps = [{ key: 'EXT', label: 'Extrusión', status: row['EXT.ESTATUS'], fecha: row['FECHA EN QUE SE EXTRUYE'] }];

  // Solo agregar impresión si es impreso Y no va en bolseo
  if (impreso && !impEnBolseo) {
    steps.push({ key: 'IMP', label: 'Impresión', status: row['IMP. ESTATUS'], fecha: row['FECHA EN QUE SE IMPRIME '] });
  }

  if (tipo === 'funda') steps.push({ key: 'CORR', label: 'Corrugado', status: row['CORR.ESTATUS'], fecha: row['FECHA EN QUE SE CORRUGA'] });
  else if (tipo === 'bolsa') steps.push({ key: 'BOL', label: 'Bolseo', status: row['BOL.ESTATUS'], fecha: row['FECHA EN QUE SE BOLSEA'] });
  else if (tipo === 'bobina') steps.push({ key: 'EMP', label: 'Empaque', status: row['EMP.STATUS'], fecha: row['FECHA EN QUE SE EMPACA'] });

  return { steps: steps, impreso: impreso, tipo: tipo, impEnBolseo: impEnBolseo };
}

const DONE_ST = ['TERMINADO','TERMINADA'];
const ACTIVE_ST = ['PROCESO','PARCIAL','INCOMPLETO','SOLICITADO','DISPONIBLE','PENDIENTE'];

function stepState(status) {
  if (!status) return 'pending';
  const s = status.trim().toUpperCase();
  if (DONE_ST.indexOf(s) !== -1) return 'done';
  for (var i = 0; i < ACTIVE_ST.length; i++) { if (s.indexOf(ACTIVE_ST[i]) !== -1) return 'active'; }
  return 'pending';
}

function fechaValida(f) {
  if (!f) return false;
  const yr = parseInt(f.split('/')[2]);
  return yr >= 2024;
}

function tipoFolio(folio) {
  if (!folio) return 'normal';
  const f = folio.trim().toUpperCase();
  if (f === 'E.0000') return 'no_programado';
  if (f === 'STOCK') return 'stock';
  return 'normal';
}

function renderCard(row) {
  const flow = getFlow(row);
  const steps = flow.steps;
  const impreso = flow.impreso;
  const tipo = flow.tipo;
  const impEnBolseo = flow.impEnBolseo;
  let tipoLabel = impreso ? tipo + ' impresa' : tipo + ' s/imp';
  if (impEnBolseo) tipoLabel = tipo + ' monotinta';
  const folio = tipoFolio(row.FOLIO);
  const isStock = folio === 'stock';

  let tags = '<span class="tag tag-blue">#' + row.PEDIDO + '</span>';
  tags += '<span class="tag tag-gray">' + row.CLIENTE + '</span>';
  tags += '<span class="tag tag-green">' + tipoLabel + '</span>';
  if (row['PT CEDIS']) tags += '<span class="tag tag-orange">PT CEDIS: ' + row['PT CEDIS'] + '</span>';

  let stepsHtml = '';
  for (var i = 0; i < steps.length; i++) {
    const s = steps[i];
    const effectiveStatus = (isStock && s.key === 'EXT') ? 'TERMINADO' : s.status;
    const state = stepState(effectiveStatus);
    const cls = state === 'done' ? 'step-done' : state === 'active' ? 'step-active' : 'step-pending';
    const r0 = i === 0 ? '20px 0 0 20px' : '0';
    const r1 = i === steps.length - 1 ? '0 20px 20px 0' : '0';
    const fechaHtml = (s.fecha && state !== 'done') ? '<span class="step-fecha">' + s.fecha + '</span>' : '';
    stepsHtml += '<div class="step ' + cls + '" style="border-radius:' + r0 + ' ' + r1 + '">' + s.label + fechaHtml + '</div>';
  }

  return '<div class="card"><div class="tags">' + tags + '</div>' +
    '<div class="desc">' + (row['DESCRIPCIÓN'] || '') + '</div>' +
    '<div class="stepbar">' + stepsHtml + '</div>' +
    '<div class="legend">' +
    '<div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Terminado</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#D85A30"></div>En proceso</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#B5D4F4"></div>Pendiente</div>' +
    '</div></div>';
}

function addMsg(role, text, rows) {
  const rowEl = document.createElement('div');
  rowEl.className = 'msg-row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const bt = document.createElement('div');
  bt.className = 'bubble-text';
  bt.textContent = text;
  bubble.appendChild(bt);
  if (rows && rows.length) {
    for (var i = 0; i < rows.length; i++) {
      const idx = rows[i];
      if (PROD_DATA[idx]) {
        const tmp = document.createElement('div');
        tmp.innerHTML = renderCard(PROD_DATA[idx]);
        bubble.appendChild(tmp.firstChild);
      }
    }
  }
  rowEl.appendChild(bubble);
  chat.appendChild(rowEl);
  chat.scrollTop = chat.scrollHeight;
}

function addLoading() {
  const el = document.createElement('div');
  el.className = 'msg-row bot';
  el.id = 'loading-msg';
  el.innerHTML = '<div class="loading">Consultando...</div>';
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

addMsg('bot', 'Hola, soy tu asistente de producción Zubex. Escribe un número de pedido, cliente o código para consultar su estado.', null);

const SYSTEM = 'Eres el asistente de producción de Zubex. Buscas pedidos por número, cliente o código.\nResponde SOLO con JSON sin markdown:\nSi encontraste: {"found":true,"rows":[índices 0-based],"mensaje":"resumen natural"}\nSi no: {"found":false,"mensaje":"No encontré ese pedido."}\nBusca flexible. Máximo 5 resultados.\n\nCada fila incluye PROCESOS con el estatus de cada paso del flujo que aplica a esa partida.\nReglas para el mensaje:\n1. Solo menciona los procesos que aparecen en PROCESOS.\n2. Si un proceso está TERMINADO, menciónalo sin fecha.\n3. Solo menciona fechas para procesos PENDIENTES o EN PROCESO.\n4. Sé breve y natural para un asesor de ventas.\n\nSi alguna fila tiene FECHA_INVALIDA:true, responde SOLO:\n"No tengo información clara de este pedido, por favor dirígete con el personal de planeación."\n\nSi alguna fila tiene INCOMPLETO:true, agrega al final:\n"Este pedido al parecer fue concluido con un faltante, te recomendamos validarlo con el departamento de planeación."\n\nCampo FOLIO:\n- no_programado: "Este pedido aún no ha sido programado en producción, por favor contacta al departamento de planeación."\n- stock: extrusión ya cubierta.\n- normal: flujo normal.';

function send() {
  const q = txt.value.trim();
  if (!q) return;
  txt.value = '';
  addMsg('user', q, null);
  const loader = addLoading();

  const ctx = PROD_DATA.map(function(r, i) {
    const flow = getFlow(r);
    const steps = flow.steps;
    const folio = tipoFolio(r.FOLIO);
    const resumen = steps.map(function(s) {
      let st = (s.status || '').trim().toUpperCase();
      if (s.key === 'EXT' && folio === 'stock' && DONE_ST.indexOf(st) === -1) st = 'TERMINADO';
      if (DONE_ST.indexOf(st) !== -1) return s.label + ': TERMINADO';
      if (st === 'INCOMPLETO' || st === 'PARCIAL') return s.label + ': INCOMPLETO';
      const fv = fechaValida(s.fecha);
      if (fv) return s.label + ': PENDIENTE el ' + s.fecha;
      if (s.fecha && !fv) return s.label + ': FECHA_INVALIDA';
      return s.label + ': PENDIENTE (sin fecha)';
    });
    return {
      i: i,
      PEDIDO: r.PEDIDO,
      CLIENTE: r.CLIENTE,
      CODIGO: r.CODIGO,
      FOLIO: folio,
      PROCESOS: resumen,
      FECHA_INVALIDA: resumen.some(function(x) { return x.indexOf('FECHA_INVALIDA') !== -1; }),
      INCOMPLETO: resumen.some(function(x) { return x.indexOf('INCOMPLETO') !== -1; })
    };
  });

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM + '\n\nDATOS:\n' + JSON.stringify(ctx),
      messages: [{ role: 'user', content: q }]
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    const raw = ((data.content && data.content[0] && data.content[0].text) || '').replace(/```json|```/g, '').trim();
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) { parsed = { found: false, mensaje: raw }; }
    loader.remove();
    addMsg('bot', parsed.mensaje, parsed.found ? parsed.rows : null);
  })
  .catch(function() {
    loader.remove();
    addMsg('bot', 'Error al consultar. Verifica tu conexión a internet.', null);
  });
}
